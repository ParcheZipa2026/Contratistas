<svg width="220" height="64" viewBox="0 0 220 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Parche Zipa">
  <!-- Reemplaza este archivo por el logo oficial manteniendo el nombre logo.svg -->
  <defs>
    <linearGradient id="pz-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5BFF"/>
      <stop offset="1" stop-color="#6C3BFF"/>
    </linearGradient>
  </defs>
  <!-- Marca: burbuja de chat (parche/encuentro) con chispa -->
  <rect x="2" y="6" width="52" height="44" rx="16" fill="url(#pz-grad)"/>
  <path d="M18 50 L18 60 L30 50 Z" fill="#6C3BFF"/>
  <circle cx="20" cy="28" r="5" fill="#FFE14D"/>
  <circle cx="36" cy="28" r="5" fill="#2BFFAC"/>
  <path d="M16 40 Q28 49 40 40" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Wordmark -->
  <text x="66" y="29" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="-0.5">PARCHE</text>
  <text x="66" y="50" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="22" fill="#FFE14D" letter-spacing="-0.5">ZIPA</text>
</svg>
