<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6C3BFF" />
  <title>Parche Zipa · Gestión Contractual</title>
  <meta name="description" content="Sistema Inteligente de Gestión Contractual — Programa de Juventudes, Secretaría de Familia y Desarrollo Social de Zipaquirá." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- El contenido se monta dinámicamente -->
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-wrap"></div>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Registro del service worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.warn);
      });
    }
  </script>
</body>
</html>
